<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisis y Metricas Verssato</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verssato KPI">
<link rel="apple-touch-icon" href="https://i.imgur.com/upCEy1O.jpeg">

<link rel="icon" href="https://i.imgur.com/upCEy1O.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background:#f0f2f5;
    margin:0;
    padding:20px;
}

/* LOGIN CENTER */
#loginBox {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login {
    width:100%;
    max-width:400px;
    background:white;
    border-radius:20px;
    padding:35px 30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    text-align:center;
    animation:fadeIn 0.5s ease;
}

.login img {
    width:200px;
    margin-bottom:15px;
}

.login input {
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:14px;
    transition:all 0.3s ease;
    box-sizing: border-box;
}

.login input:focus {
    outline:none;
    border-color:#e60000;
    box-shadow:0 0 0 3px rgba(230,0,0,0.1);
}

.login button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#e60000;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login button:hover {
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(230,0,0,0.3);
}

/* DASHBOARD */
.card {
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    display:none;
    animation:fadeIn 0.4s ease;
}

h2 {
    text-align:center;
    border-bottom:2px solid #e60000;
    padding-bottom:10px;
}

select {
    width:100%;
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    border:1px solid #ddd;
    transition:0.3s;
}

select:focus {
    outline:none;
    border-color:#e60000;
    box-shadow:0 0 0 3px rgba(230,0,0,0.1);
}

.table-container{
    width:100%;
    overflow-x:auto;
}

table {
    width:100%;
    border-collapse:collapse;
    min-width:600px;
}

th, td {
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

th {
    background:#e60000;
    color:white;
}

tr:hover {
    background:#fafafa;
}

.btn {
    cursor:pointer;
    font-size:18px;
    transition:0.2s;
}

.btn:hover {
    transform:scale(1.2);
}

.badge {
    display:inline-block;
    margin-top:5px;
    padding:4px 8px;
    border-radius:8px;
    font-size:11px;
    font-weight:600;
    color:white;
}

.badge-debil { background:#ff3b30; }
.badge-normal { background:#ff9500; }
.badge-bueno { background:#34c759; }
.badge-elite { background:#007aff; }

#modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    animation:fadeIn 0.3s ease;
}

.modal-content {
    background:white;
    padding:25px;
    width:90%;
    max-width:500px;
    border-radius:20px;
    text-align:center;
    animation:scaleIn 0.3s ease;
}

.modal-box {
    background: rgba(230, 0, 0, 0.08);
    border: 1px solid rgba(230, 0, 0, 0.2);
    border-radius: 15px;
    padding: 15px;
    margin-top: 15px;
    text-align: left;
}

.modal-box h4 {
    margin: 0 0 8px 0;
    color: #e60000;
    font-size: 14px;
}

.modal-box p {
    margin: 0;
    font-size: 14px;
    color: #333;
    line-height: 1.4;
}

.modal-content button {
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#e60000;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes scaleIn {
    from {transform:scale(0.8); opacity:0;}
    to {transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div id="loginBox">
    <div class="login">
        <img src="https://i.imgur.com/aOSGzTG.png">
        <h2>ANALISIS DE METRICAS</h2>
        <input type="text" id="user">
        <input type="password" id="pass">
        <button onclick="login()">ENTRAR AL PANEL</button>
    </div>
</div>

<div class="card" id="dashboard">
    <h2>Analisis General de Metricas</h2>

    <select id="filtroTienda">
        <option value="TODAS">Todas las tiendas</option>
    </select>

    <div class="table-container">
    <table>
        <thead>
            <tr>
                <th>No.</th>
                <th>Tienda</th>
                <th>Vendedor</th>
                <th>Grupal</th>
                <th>Individual</th>
                <th>Reporte</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <div class="modal-box">
            <h4>📊 Análisis</h4>
            <p id="analisis"></p>
        </div>

        <div class="modal-box">
            <h4>🚀 Consejos</h4>
            <p id="consejos"></p>
        </div>

        <button onclick="cerrarModal()">Cerrar</button>
    </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzdsAPPGok3ehgYQ75XX-u2E3bvx_VF3c7UX3HuAAG9GXxnCMuIHtbe80eYeBZYbiQ6WQ/exec";

let datosGlobal = [];

// 🔥 NUEVO FILTRO ÚLTIMO REGISTRO
function obtenerUltimosRegistros(data){
    const mapa = {};
    data.forEach(d=>{
        const key = d.vendedor;
        if(!mapa[key] || new Date(d.fecha) > new Date(mapa[key].fecha)){
            mapa[key] = d;
        }
    });
    return Object.values(mapa);
}

function calcularScore(d){
    return (parseFloat(d.conversionGrupal) + parseFloat(d.conversionIndividual)) / 2;
}

function getColor(score){
    if(score < 45) return "#ff3b30";
    if(score < 65) return "#ff9500";
    if(score < 80) return "#34c759";
    return "#007aff";
}

function getAlerta(d){
    const cg = parseFloat(d.conversionGrupal);
    const ci = parseFloat(d.conversionIndividual);

    if(cg < 40 && ci < 50) return "⚠ CRITICO";
    if(cg >= 60 && ci < 50) return "💰";
    if(cg < 40 && ci >= 65) return "🎯";
    if(cg >= 75 && ci >= 85) return "🔥";
    return "";
}

function getBadge(nivel){
    if(nivel === "VENTA DEBIL") return '<span class="badge badge-debil">DEBIL</span>';
    if(nivel === "VENTA NORMAL") return '<span class="badge badge-normal">NORMAL</span>';
    if(nivel === "BUEN VENDEDOR") return '<span class="badge badge-bueno">BUENO</span>';
    if(nivel === "VENDEDOR ELITE") return '<span class="badge badge-elite">ELITE</span>';
    return "";
}

function login(){
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if(u === "VerssatoSupervisores" && p === "verss@to2026"){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        cargarDatos();
    } else {
        alert("Credenciales incorrectas");
    }
}

function cargarDatos(){
    fetch(URL)
    .then(res => res.json())
    .then(data => {
        datosGlobal = data;
        cargarTiendas(data);

        const filtrados = obtenerUltimosRegistros(data);
        renderTabla(rankear(filtrados));
    });
}

function cargarTiendas(data){
    const tiendas = [...new Set(data.map(d => d.tienda))];
    const select = document.getElementById("filtroTienda");

    tiendas.forEach(t => {
        const option = document.createElement("option");
        option.value = t;
        option.textContent = t;
        select.appendChild(option);
    });
}

document.getElementById("filtroTienda").addEventListener("change", function(){
    const valor = this.value;

    if(valor === "TODAS"){
        const filtrados = obtenerUltimosRegistros(datosGlobal);
        renderTabla(rankear(filtrados));
    } else {
        const filtrados = obtenerUltimosRegistros(
            datosGlobal.filter(d => d.tienda === valor)
        );
        renderTabla(rankear(filtrados));
    }
});

function rankear(data){
    return data.sort((a,b)=>{
        return calcularScore(b) - calcularScore(a);
    });
}

function renderTabla(data){
    const tbody = document.getElementById("tablaBody");
    tbody.innerHTML = "";

    data.forEach((d, index)=>{
        const score = calcularScore(d);
        const color = getColor(score);
        const alerta = getAlerta(d);

        let medal = "";
        if(index === 0) medal = "🥇";
        else if(index === 1) medal = "🥈";
        else if(index === 2) medal = "🥉";

        const row = `
        <tr style="border-left:6px solid ${color};">
            <td>${medal || index+1}</td>
            <td>${d.tienda}</td>
            <td>
                ${d.vendedor} ${alerta}<br>
                ${getBadge(d.nivel)}
            </td>
            <td>${d.conversionGrupal}</td>
            <td>${d.conversionIndividual}</td>
            <td class="btn" onclick='verDetalle(${JSON.stringify(d)})'>📊</td>
        </tr>
        `;
        tbody.innerHTML += row;
    });
}

function verDetalle(d){
    document.getElementById("analisis").innerText = d.analisis;
    document.getElementById("consejos").innerText = d.consejos;
    document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
