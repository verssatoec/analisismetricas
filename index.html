<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analisis y Metricas Verssato</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verssato KPI">
<link rel="apple-touch-icon" href="https://i.imgur.com/upCEy1O.jpeg">

<link rel="icon" href="https://i.imgur.com/upCEy1O.jpeg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background:#f0f2f5;
    margin:0;
    padding:20px;
}

/* LOGIN CENTER */
#loginBox {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login {
    width:100%;
    max-width:400px;
    background:white;
    border-radius:20px;
    padding:35px 30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    text-align:center;
    animation:fadeIn 0.5s ease;
}

.login img {
    width:200px;
    margin-bottom:15px;
}

.login input {
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:14px;
    transition:all 0.3s ease;
    box-sizing: border-box;
}

.login input:focus {
    outline:none;
    border-color:#e60000;
    box-shadow:0 0 0 3px rgba(230,0,0,0.1);
}

.login button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#e60000;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login button:hover {
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(230,0,0,0.3);
}

/* DASHBOARD */
.card {
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    display:none;
    animation:fadeIn 0.4s ease;
}

h2 {
    text-align:center;
    border-bottom:2px solid #e60000;
    padding-bottom:10px;
}

select {
    width:100%;
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    border:1px solid #ddd;
    transition:0.3s;
}

select:focus {
    outline:none;
    border-color:#e60000;
    box-shadow:0 0 0 3px rgba(230,0,0,0.1);
}

.table-container{
    width:100%;
    overflow-x:auto;
}

table {
    width:100%;
    border-collapse:collapse;
    min-width:600px;
}

th, td {
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

th {
    background:#e60000;
    color:white;
}

tr:hover {
    background:#fafafa;
}

.btn {
    cursor:pointer;
    font-size:18px;
    transition:0.2s;
}

.btn:hover {
    transform:scale(1.2);
}

.badge {
    display:inline-block;
    margin-top:5px;
    padding:4px 8px;
    border-radius:8px;
    font-size:11px;
    font-weight:600;
    color:white;
}

.badge-debil { background:#ff3b30; }
.badge-normal { background:#ff9500; }
.badge-bueno { background:#34c759; }
.badge-elite { background:#007aff; }

#modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    animation:fadeIn 0.3s ease;
}

.modal-content {
    background:white;
    padding:25px;
    width:90%;
    max-width:500px;
    border-radius:20px;
    text-align:center;
    animation:scaleIn 0.3s ease;
}

.modal-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

@media(max-width:700px){
    .modal-grid{
        grid-template-columns:1fr;
    }
}

.modal-box {
    background: rgba(230, 0, 0, 0.08);
    border: 1px solid rgba(230, 0, 0, 0.2);
    border-radius: 15px;
    padding: 15px;
    margin-top: 15px;
    text-align: left;
}

.modal-box h4 {
    margin: 0 0 8px 0;
    color: #e60000;
    font-size: 14px;
}

.modal-box p {
    margin: 0;
    font-size: 14px;
    color: #333;
    line-height: 1.4;
}

.modal-content button {
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#e60000;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

@keyframes scaleIn {
    from {transform:scale(0.8); opacity:0;}
    to {transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div id="loginBox">
    <div class="login">
        <img src="https://i.imgur.com/aOSGzTG.png">
        <h2>ANALISIS DE METRICAS</h2>
        <input type="text" id="user" placeholder="INGRESA TU USUARIO DE SUPERVISOR">
	<input type="password" id="pass" placeholder="INGRESA TU CONTRASEÑA">
        <button onclick="login()">ENTRAR AL PANEL</button>
    </div>
</div>

<div class="card" id="dashboard">
    <h2>Analisis General de Metricas</h2>

    <select id="filtroTienda">
        <option value="TODAS">Todas las tiendas</option>
    </select>

    <button onclick="abrirReporteSemanal()" style="
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#111;
color:white;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;
font-size:15px;
">
Reporte Semanal por Tienda
</button>

    <div class="table-container">
    <table>
        <thead>
            <tr>
                <th>No.</th>
                <th>Tienda</th>
                <th>Vendedor</th>
                <th>Grupal</th>
                <th>Individual</th>
                <th>Reporte</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <div class="modal-box">
            <h4>📊 Análisis</h4>
            <p id="analisis"></p>
        </div>

        <div class="modal-box">
            <h4>🚀 Consejos</h4>
            <p id="consejos"></p>
        </div>

        <button onclick="cerrarModal()">Cerrar</button>
    </div>
</div>

<div id="modalSemanal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
padding:15px;
box-sizing:border-box;
">

<div style="
background:white;
width:100%;
max-width:900px;
max-height:90vh;
overflow-y:auto;
border-radius:20px;
padding:25px;
animation:scaleIn 0.3s ease;
">

<h2 style="margin-top:0;">REPORTE SEMANAL NACIONAL</h2>

<div class="modal-grid">

<div class="modal-box">
<h4>TOP 3 SEMANAL</h4>
<p id="topSemanal"></p>
</div>

<div class="modal-box">
<h4>VENDEDORES CRÍTICOS</h4>
<p id="criticosSemana"></p>
</div>

<div class="modal-box">
<h4>MAYOR MEJORA DE VENDEDOR</h4>
<p id="mejoraSemana"></p>
</div>

<div class="modal-box">
<h4>VENDEDOR MÁS CONSISTENTE</h4>
<p id="consistenteSemana"></p>
</div>

<div class="modal-box">
<h4>MEJOR TIENDA NACIONAL</h4>
<p id="mejorTienda"></p>
</div>

<div class="modal-box">
<h4>PROMEDIO NACIONAL</h4>
<p id="promedioNacional"></p>
</div>

</div>

<button onclick="cerrarReporteSemanal()" style="
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#e60000;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
">
Cerrar Reporte
</button>

</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzdsAPPGok3ehgYQ75XX-u2E3bvx_VF3c7UX3HuAAG9GXxnCMuIHtbe80eYeBZYbiQ6WQ/exec";

let datosGlobal = [];

// 🔥 NUEVO FILTRO ÚLTIMO REGISTRO
function obtenerUltimosRegistros(data){
    const mapa = {};
    data.forEach(d=>{
        const key = d.vendedor;
        if(!mapa[key] || new Date(d.fecha) > new Date(mapa[key].fecha)){
            mapa[key] = d;
        }
    });
    return Object.values(mapa);
}

function calcularScore(d){
    return (parseFloat(d.conversionGrupal) + parseFloat(d.conversionIndividual)) / 2;
}

function getColor(score){
    if(score < 45) return "#ff3b30";
    if(score < 65) return "#ff9500";
    if(score < 80) return "#34c759";
    return "#007aff";
}

function getAlerta(d){
    const cg = parseFloat(d.conversionGrupal);
    const ci = parseFloat(d.conversionIndividual);

    if(cg < 40 && ci < 50) return "CRITICO";
    if(cg >= 60 && ci < 50) return "";
    if(cg < 40 && ci >= 65) return "";
    if(cg >= 75 && ci >= 85) return "";
    return "";
}

function getBadge(nivel){
    if(nivel === "VENTA DEBIL") return '<span class="badge badge-debil">DEBIL</span>';
    if(nivel === "VENTA NORMAL") return '<span class="badge badge-normal">NORMAL</span>';
    if(nivel === "BUEN VENDEDOR") return '<span class="badge badge-bueno">BUENO</span>';
    if(nivel === "VENDEDOR ELITE") return '<span class="badge badge-elite">ELITE</span>';
    return "";
}

function login(){
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if(u === "VerssatoSupervisores" && p === "verss@to2026"){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        cargarDatos();
    } else {
        alert("Credenciales incorrectas");
    }
}

function cargarDatos(){
    fetch(URL)
    .then(res => res.json())
    .then(data => {
        datosGlobal = data;
        cargarTiendas(data);

        const filtrados = obtenerUltimosRegistros(data);
        renderTabla(rankear(filtrados));
    });
}

function cargarTiendas(data){
    const tiendas = [...new Set(data.map(d => d.tienda))];
    const select = document.getElementById("filtroTienda");

    tiendas.forEach(t => {
        const option = document.createElement("option");
        option.value = t;
        option.textContent = t;
        select.appendChild(option);
    });
}

document.getElementById("filtroTienda").addEventListener("change", function(){
    const valor = this.value;

    if(valor === "TODAS"){
        const filtrados = obtenerUltimosRegistros(datosGlobal);
        renderTabla(rankear(filtrados));
    } else {
        const filtrados = obtenerUltimosRegistros(
            datosGlobal.filter(d => d.tienda === valor)
        );
        renderTabla(rankear(filtrados));
    }
});

function rankear(data){
    return data.sort((a,b)=>{
        return calcularScore(b) - calcularScore(a);
    });
}

function renderTabla(data){
    const tbody = document.getElementById("tablaBody");
    tbody.innerHTML = "";

    data.forEach((d, index)=>{
        const score = calcularScore(d);
        const color = getColor(score);
        const alerta = getAlerta(d);

        let medal = "";
        if(index === 0) medal = "🥇";
        else if(index === 1) medal = "🥈";
        else if(index === 2) medal = "🥉";

        const row = `
        <tr style="border-left:6px solid ${color};">
            <td>${medal || index+1}</td>
            <td>${d.tienda}</td>
            <td>
                ${d.vendedor} ${alerta}<br>
                ${getBadge(d.nivel)}
            </td>
            <td>${d.conversionGrupal}</td>
            <td>${d.conversionIndividual}</td>
            <td class="btn" onclick='verDetalle(${JSON.stringify(d)})'>📊</td>
        </tr>
        `;
        tbody.innerHTML += row;
    });
}

function verDetalle(d){

    const historial = datosGlobal
    .filter(x => x.vendedor === d.vendedor)
    .sort((a,b)=> new Date(b.fecha) - new Date(a.fecha));

    const actual = historial[0];
    const anterior = historial[1];

    let resumen = "";

    const actualCG = parseFloat(actual.conversionGrupal);
    const actualCI = parseFloat(actual.conversionIndividual);

    if(actualCG >= 75 && actualCI >= 85){
        resumen = "El vendedor mantiene un desempeño elite tanto en cierre como en aprovechamiento comercial.";
    }
    else if(actualCG >= 60 && actualCI >= 65){
        resumen = "El vendedor presenta un rendimiento sólido y estable en métricas comerciales.";
    }
    else if(actualCG < 40){
        resumen = "El vendedor presenta problemas importantes en conversión y cierre comercial.";
    }
    else{
        resumen = "El vendedor mantiene un desempeño intermedio con oportunidades claras de mejora.";
    }

    document.querySelector(".modal-content").innerHTML = `

        <div class="modal-grid">

            <div class="modal-box">
                <h4>📊 Resumen Ejecutivo</h4>
                <p>${resumen}</p>
            </div>

            <div class="modal-box">
                <h4>📈 Comparativa KPI</h4>

                <p>
                <strong>Conversión Grupal:</strong><br>
                Actual: ${actual.conversionGrupal}<br>
                Anterior: ${anterior ? anterior.conversionGrupal : "Sin registro"}
                </p>

                <br>

                <p>
                <strong>Conversión Individual:</strong><br>
                Actual: ${actual.conversionIndividual}<br>
                Anterior: ${anterior ? anterior.conversionIndividual : "Sin registro"}
                </p>
            </div>

            <div class="modal-box">
                <h4>📦 Datos Operativos</h4>

                <p>👥 Grupos: ${actual.grupos}</p>
                <p>👤 Personas: ${actual.personas}</p>
                <p>🧾 Ventas: ${actual.ventas}</p>
                <p>📦 Productos: ${actual.productos}</p>
            </div>

            <div class="modal-box">
                <h4>🚀 Consejos</h4>
                <p>${actual.consejos.replace(/\n/g,"<br>")}</p>
            </div>

        </div>

        <button onclick="cerrarModal()">Cerrar</button>
    `;

    document.getElementById("modal").style.display = "flex";
    document.body.style.overflow = "hidden";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
    document.body.style.overflow = "auto";
}

function abrirReporteSemanal(){

    const hace7Dias = new Date();
    hace7Dias.setDate(hace7Dias.getDate() - 7);

    const semana = datosGlobal.filter(d=>{
        return new Date(d.fecha) >= hace7Dias;
    });

    // 🔥 SCORE
    semana.forEach(d=>{
        d.score = calcularScore(d);
    });

    // 🥇 TOP 3
    const top = [...semana]
    .sort((a,b)=> b.score - a.score)
    .slice(0,3);

    document.getElementById("topSemanal").innerHTML = top.map((d,i)=>
        `${i+1}. <strong>${d.vendedor}</strong> (${d.score.toFixed(1)} pts)`
    ).join("<br><br>");

    // CRITICOS
    const criticos = semana.filter(d=>
        parseFloat(d.conversionGrupal) < 40 &&
        parseFloat(d.conversionIndividual) < 50
    );

    document.getElementById("criticosSemana").innerHTML =
    criticos.length > 0
    ? criticos.slice(0,5).map(d=>
        `⚠ ${d.vendedor} (${d.tienda})`
      ).join("<br><br>")
    : "No existen vendedores críticos esta semana.";

    // 📈 MAYOR MEJORA
    const mejoras = {};

    semana.forEach(d=>{
        if(!mejoras[d.vendedor]){
            mejoras[d.vendedor] = [];
        }
        mejoras[d.vendedor].push(d);
    });

    let mejorNombre = "";
    let mejorCambio = -999;

    Object.keys(mejoras).forEach(vendedor=>{

        const historial = mejoras[vendedor]
        .sort((a,b)=> new Date(a.fecha) - new Date(b.fecha));

        if(historial.length >= 2){

            const primero = calcularScore(historial[0]);
            const ultimo = calcularScore(historial[historial.length-1]);

            const mejora = ultimo - primero;

            if(mejora > mejorCambio){
                mejorCambio = mejora;
                mejorNombre = vendedor;
            }
        }
    });

    document.getElementById("mejoraSemana").innerHTML =
    mejorNombre
    ? `<strong>${mejorNombre}</strong><br>Mejoró ${mejorCambio.toFixed(1)} puntos`
    : "Sin suficientes registros.";

    // 🔥 MÁS CONSISTENTE
    let consistente = "";
    let mejorPromedio = 0;

    Object.keys(mejoras).forEach(vendedor=>{

        const historial = mejoras[vendedor];

        if(historial.length >= 3){

            const promedio =
            historial.reduce((acc,d)=> acc + calcularScore(d),0)
            / historial.length;

            if(promedio > mejorPromedio){
                mejorPromedio = promedio;
                consistente = vendedor;
            }
        }
    });

    document.getElementById("consistenteSemana").innerHTML =
    consistente
    ? `<strong>${consistente}</strong><br>Promedio: ${mejorPromedio.toFixed(1)} pts`
    : "Sin suficientes registros.";

    // 🏪 MEJOR TIENDA
    const tiendas = {};

    semana.forEach(d=>{

        if(!tiendas[d.tienda]){
            tiendas[d.tienda] = [];
        }

        tiendas[d.tienda].push(calcularScore(d));
    });

    let mejorTienda = "";
    let scoreTienda = 0;

    Object.keys(tiendas).forEach(tienda=>{

        const promedio =
        tiendas[tienda].reduce((a,b)=> a+b,0)
        / tiendas[tienda].length;

        if(promedio > scoreTienda){
            scoreTienda = promedio;
            mejorTienda = tienda;
        }
    });

    document.getElementById("mejorTienda").innerHTML =
    `<strong>${mejorTienda}</strong><br>${scoreTienda.toFixed(1)} pts promedio`;

    // 📊 PROMEDIO NACIONAL
    const promedioNacional =
    semana.reduce((acc,d)=> acc + calcularScore(d),0)
    / semana.length;

    document.getElementById("promedioNacional").innerHTML =
    `<strong>${promedioNacional.toFixed(1)} pts</strong><br>
    Rendimiento promedio nacional semanal`;

    document.getElementById("modalSemanal").style.display = "flex";
}

function cerrarReporteSemanal(){
    document.getElementById("modalSemanal").style.display = "none";
}
</script>

</body>
</html>
